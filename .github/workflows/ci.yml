name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_DATABASE: uts_test
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    strategy:
      matrix:
        php-version: [8.2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v3
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql, bcmath, json
          tools: composer:v2

      - name: Install dependencies
        working-directory: ./src
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env file
        working-directory: ./src
        run: cp .env.example .env.testing

      - name: Generate app key
        working-directory: ./src
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: ./src
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: uts_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --env=testing

      - name: Run tests with Pest
        working-directory: ./src
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: uts_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

  code-style:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [8.2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v3
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, json
          tools: composer:v2

      - name: Install dependencies
        working-directory: ./src
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code style with Pint
        working-directory: ./src
        run: ./vendor/bin/pint --test

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: 8.2
          extensions: mbstring, json
          tools: composer:v2

      - name: Install dependencies
        working-directory: ./src
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check for security vulnerabilities
        working-directory: ./src
        run: composer audit || true

  build:
    needs: [test, code-style, security]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Build status
        run: echo "✅ All checks passed! Ready for deployment."